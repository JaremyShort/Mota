<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔塔 - 经典像素风格</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>魔塔</h1>
            <span class="floor-indicator">第 1 层</span>
        </header>

        <main class="game-main">
            <!-- 左侧地图区 -->
            <div class="map-container">
                <canvas id="gameCanvas" width="560" height="560"></canvas>
            </div>

            <!-- 右侧面板区 -->
            <aside class="side-panel">
                <!-- 勇士状态栏 -->
                <div class="status-panel">
                    <h2>勇士状态</h2>
                    <div class="status-item">
                        <span class="status-label">生命</span>
                        <span class="status-value hp">1000</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">攻击</span>
                        <span class="status-value atk">10</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">防御</span>
                        <span class="status-value def">10</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">金币</span>
                        <span class="status-value gold">0</span>
                    </div>
                    <div class="keys-section">
                        <h3>钥匙</h3>
                        <div class="keys-row">
                            <span class="key yellow-key">1</span>
                            <span class="key blue-key">0</span>
                            <span class="key red-key">0</span>
                        </div>
                    </div>
                </div>

                <!-- 信息面板 -->
                <div class="info-panel">
                    <h2>信息</h2>
                    <div class="info-content">
                        <p class="info-line">欢迎来到魔塔！</p>
                        <p class="info-line">你的目标是击败魔王，救出公主。</p>
                        <p class="info-line tip">提示：使用方向键移动</p>
                    </div>
                </div>
            </aside>
        </main>

        <footer class="game-footer">
            <p>经典魔塔网页版 - 像素风格原型</p>
        </footer>
    </div>

    <!-- 模块化脚本（按依赖顺序加载） -->
    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/map.js"></script>
    <script src="js/renderer.js"></script>
    <script src="js/battle.js"></script>
    <script src="js/item.js"></script>
    <script src="js/shop.js"></script>
    <script src="js/save.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/tooltip.js"></script>
    <script src="js/input.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
